[package]
name = "rsi"
version = "0.9.0"
edition = "2021"
description = "Recursive Self-Improvement — implémentation Rust du système géométrique unifié (v9)"
license = "MIT"
authors = ["RSI"]

[lib]
name = "rsi"
path = "src/lib.rs"

[[bin]]
name = "rsi-demo"
path = "src/main.rs"

[[bin]]
name = "rsi-mcp"
path = "src/bin/rsi_mcp.rs"

[[bin]]
name = "rsi-connect"
path = "src/bin/rsi_connect.rs"

[profile.release]
opt-level = 3
lto = true
